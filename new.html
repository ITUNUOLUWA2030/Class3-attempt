 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WCI Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main>
        <section class="form-container">
            <h2>Student Registration</h2>
            <p>Join the WALGAB Career LLC Skill-Up Program</p>
            
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="example@mail.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="form-group">
                    <label>Gender</label>
                    <div class="radio-group">
                        <input type="radio" id="male" name="gender" value="male">
                        <label for="male" class="inline-label">Male</label>
                        <input type="radio" id="female" name="gender" value="female">
                        <label for="female" class="inline-label">Female</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Skills</label>
                    <div class="checkbox-group">
                        <input type="checkbox" id="html" name="skills" value="HTML">
                        <label for="html" class="inline-label">HTML</label>
                        <input type="checkbox" id="css" name="skills" value="CSS">
                        <label for="css" class="inline-label">CSS</label>
                        <input type="checkbox" id="js" name="skills" value="JS">
                        <label for="js" class="inline-label">JavaScript</label>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="dob">Date of Birth</label>
                        <input type="date" id="dob" name="dob">
                    </div>
                    <div class="form-group">
                        <label for="country">Country</label>
                        <select id="country" name="country">
                            <option value="nigeria">Nigeria</option>
                            <option value="ghana">Ghana</option>
                            <option value="uk">United Kingdom</option>
                            <option value="usa">USA</option>
                            <option value="others">Others</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="bio">Short Bio</label>
                    <textarea id="bio" name="bio" rows="4" placeholder="Tell us about yourself..."></textarea>
                </div>

                <button type="submit" id="submit-btn">Register Now</button>
                <button type="reset" id="reset-btn">Clear</button>
            </form>
        </section>
    </main>

</body>
</html>
